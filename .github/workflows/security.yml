name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Bandit static analysis
        run: bandit -r keysentinel/ -ll -x tests/

      - name: pip-audit dependency check
        run: |
          pip install --upgrade pip
          pip-audit --skip-editable

      - name: Ruff lint
        run: ruff check keysentinel/

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ --cov=keysentinel --cov-report=term-missing
